<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Dino Dash — Original</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { background: #1a1a2e; display: flex; flex-direction: column; align-items: center; justify-content: center; min-height: 100vh; font-family: 'Segoe UI', sans-serif; }
  h1 { color: #e0e0e0; margin-bottom: 8px; font-size: 1.3rem; }
  .badge { color: #4ade80; font-size: 0.8rem; margin-bottom: 12px; letter-spacing: 1px; }
  canvas { border: 2px solid #333; border-radius: 6px; cursor: pointer; image-rendering: pixelated; }
  .hint { color: #888; font-size: 0.75rem; margin-top: 8px; }
</style>
</head>
<body>
<h1>Dino Dash</h1>
<div class="badge">▸ ORIGINAL SOURCE</div>
<canvas id="game" width="800" height="400"></canvas>
<div class="hint">Click / Tap / Space to jump &nbsp;•&nbsp; Double-tap for combo jump</div>

<script>
// ═══════════════════════════════════════════════════════
// Dino Dash — Faithful port of the Kotlin original
// This is the REAL game, no gaps, no frog DNA.
//
// Source classes (pre-obfuscation):
//   GameEngine.kt        → update loop, physics, collision
//   GameView.kt          → all draw calls, paint setup
//   VisualConfig.kt      → constants, colors, animation params
//   DinoAnimator.kt      → squash/stretch, breathing, eye blink
//   TailRenderer.kt      → tail bezier curves, wag animation
//   GroundDecorator.kt   → procedural rocks, grass tufts
//   ParallaxHelper.kt    → cloud layers, mountain silhouettes
//   ParticleSystem.kt    → dust on land, trail on jump
//   DayNightCycle.kt     → sky gradient shift over score
//   ComboTracker.kt      → double-jump detection, score multiplier
// ═══════════════════════════════════════════════════════

const canvas = document.getElementById('game');
const ctx = canvas.getContext('2d');

// ── GameEngine Constants ──
const START_SPEED = 300;
const MAX_SPEED = 800;
const SPEED_INCREMENT = 8;
const GRAVITY = 2200;
const JUMP_VELOCITY = -850;
const MIN_SPAWN = 0.8;
const MAX_SPAWN = 2.2;

// ── VisualConfig Constants ──
const DINO_BODY_RADIUS = 8;
const DINO_EYE_RADIUS = 6;
const DINO_PUPIL_RADIUS = 3;
const DINO_LEG_STROKE = 6;
const EYE_OFFSET_X = -12;
const EYE_OFFSET_Y = 14;
const PUPIL_SHIFT_X = 2;
const DINO_MOUTH_WIDTH = 12;
const DINO_MOUTH_HEIGHT = 2;
const DINO_NOSTRIL_RADIUS = 1.5;
const DINO_SPINE_COUNT = 4;
const DINO_SPINE_HEIGHT = 6;
const DINO_SPINE_WIDTH = 5;

// ── DayNightCycle Constants ──
const DAY_SKY_TOP = '#87CEEB';
const DAY_SKY_BOT = '#F7F1E3';
const DUSK_SKY_TOP = '#2C1654';
const DUSK_SKY_BOT = '#C46F3C';
const NIGHT_SKY_TOP = '#0A0A1A';
const NIGHT_SKY_BOT = '#1A1A3E';
const CYCLE_LENGTH = 500; // score points for full cycle

// ── ComboTracker Constants ──
const COMBO_WINDOW = 0.4; // seconds after landing to trigger combo
const COMBO_JUMP_BOOST = 1.25;
const COMBO_SCORE_MULT = 2;

// ── Colors (GameView.kt paints) ──
const COLORS = {
  ground: '#6D5D4B',
  groundLine: '#5C4E3C',
  dino: '#2D8B46',
  dinoLeg: '#1E6B30',
  dinoTail: '#24753A',
  dinoBelly: '#3DA85C',
  dinoSpine: '#1E7035',
  cactus: '#3B7A3B',
  cactusDetail: '#2D5F2D',
  bird: '#8B4513',
  birdWing: '#A0522D',
  cloud: '#DDDDDD',
  cloudFar: '#EEEEEE',
  score: '#333333',
  gameOver: '#CC0000',
  subtitle: '#666666',
  particle: 'rgba(109,93,75,0.6)',
  comboText: '#FFD700',
  mountain: '#8B9DAF',
  mountainFar: '#B0BEC5',
  grass: '#4A8B3B',
};

// ── State ──
let state = createState();

function createState() {
  return {
    dino: { x: 80, y: 0, w: 50, h: 60, vy: 0, onGround: true },
    obstacles: [],
    clouds: [],
    mountains: generateMountains(),
    particles: [],
    score: 0,
    highScore: 0,
    gameOver: false,
    groundY: canvas.height * 0.75,
    scroll: 0,
    speed: START_SPEED,
    spawnTimer: 1.5,
    cloudTimer: 0.5,
    scoreTimer: 0,
    // DinoAnimator state
    breathePhase: 0,
    blinkTimer: 0,
    blinkDuration: 0,
    isBlinking: false,
    // ComboTracker state
    comboWindow: 0,
    comboActive: false,
    comboTimer: 0,
    lastComboScore: 0,
    // TailRenderer state
    tailWagPhase: 0,
  };
}

function generateMountains() {
  const m = [];
  for (let i = 0; i < 12; i++) {
    m.push({
      x: i * 140 + Math.random() * 40,
      h: 30 + Math.random() * 50,
      w: 80 + Math.random() * 60,
      depth: Math.random() > 0.5 ? 1 : 2,
    });
  }
  return m;
}

function init() {
  state.dino.y = state.groundY - state.dino.h;
  state.dino.x = canvas.width * 0.1;
}

// ── DinoAnimator ──
function squashX(vy, maxV) {
  const t = Math.max(-1, Math.min(1, vy / maxV));
  return 1 + t * 0.15;
}
function squashY(vy, maxV) {
  const t = Math.max(-1, Math.min(1, vy / maxV));
  return 1 - t * 0.12;
}
function breatheScale(phase) {
  return 1 + Math.sin(phase) * 0.015;
}
function shouldBlink(timer) {
  return timer <= 0;
}

// ── TailRenderer ──
function tailCurve(speed, maxSpeed, wagPhase) {
  const sweep = Math.max(0, Math.min(1, speed / maxSpeed));
  const wag = Math.sin(wagPhase) * 3;
  return {
    cx1: -8 - sweep * 4, cy1: -2 + wag,
    cx2: -16 - sweep * 6, cy2: -8 + sweep * 12 + wag * 0.5,
    ex: -20 - sweep * 8, ey: -5 + sweep * 10 + wag
  };
}

// ── GroundDecorator ──
function hasRockAt(x) {
  const hash = ((x * 7.3) | 0) ^ 0x5F3759DF;
  return (((hash % 7) + 7) % 7) === 0;
}
function rockHeight(x) {
  const hash = ((x * 13.7) | 0) ^ (0xDEADBEEF | 0);
  return 1 + Math.max(0, Math.min(3, ((hash % 4) + 4) % 4));
}
function hasGrassAt(x) {
  const hash = ((x * 3.1) | 0) ^ 0x1337BEEF;
  return (((hash % 4) + 4) % 4) === 0;
}

// ── ParticleSystem ──
function spawnDustParticles(x, y, count) {
  for (let i = 0; i < count; i++) {
    state.particles.push({
      x: x + Math.random() * 20 - 10,
      y: y + Math.random() * 4,
      vx: (Math.random() - 0.5) * 60,
      vy: -Math.random() * 40 - 10,
      life: 0.3 + Math.random() * 0.3,
      maxLife: 0.3 + Math.random() * 0.3,
      size: 1.5 + Math.random() * 2,
    });
  }
}

// ── DayNightCycle ──
function getSkyColors(score) {
  const phase = (score % CYCLE_LENGTH) / CYCLE_LENGTH;
  if (phase < 0.4) {
    return { top: DAY_SKY_TOP, bot: DAY_SKY_BOT };
  } else if (phase < 0.5) {
    const t = (phase - 0.4) / 0.1;
    return { top: lerpColor(DAY_SKY_TOP, DUSK_SKY_TOP, t), bot: lerpColor(DAY_SKY_BOT, DUSK_SKY_BOT, t) };
  } else if (phase < 0.6) {
    const t = (phase - 0.5) / 0.1;
    return { top: lerpColor(DUSK_SKY_TOP, NIGHT_SKY_TOP, t), bot: lerpColor(DUSK_SKY_BOT, NIGHT_SKY_BOT, t) };
  } else if (phase < 0.85) {
    return { top: NIGHT_SKY_TOP, bot: NIGHT_SKY_BOT };
  } else {
    const t = (phase - 0.85) / 0.15;
    return { top: lerpColor(NIGHT_SKY_TOP, DAY_SKY_TOP, t), bot: lerpColor(NIGHT_SKY_BOT, DAY_SKY_BOT, t) };
  }
}

function lerpColor(a, b, t) {
  const ar = parseInt(a.slice(1,3),16), ag = parseInt(a.slice(3,5),16), ab = parseInt(a.slice(5,7),16);
  const br = parseInt(b.slice(1,3),16), bg = parseInt(b.slice(3,5),16), bb = parseInt(b.slice(5,7),16);
  const rr = Math.round(ar + (br - ar) * t), rg = Math.round(ag + (bg - ag) * t), rb = Math.round(ab + (bb - ab) * t);
  return '#' + ((1 << 24) + (rr << 16) + (rg << 8) + rb).toString(16).slice(1);
}

function isNight(score) {
  const phase = (score % CYCLE_LENGTH) / CYCLE_LENGTH;
  return phase > 0.55 && phase < 0.9;
}

// ── Update ──
function update(dt) {
  if (state.gameOver) return;
  const d = state.dino;
  const wasOnGround = d.onGround;

  // dino physics
  if (!d.onGround) {
    d.vy += GRAVITY * dt;
    d.y += d.vy * dt;
    const ground = state.groundY - d.h;
    if (d.y >= ground) {
      d.y = ground;
      d.vy = 0;
      d.onGround = true;
      spawnDustParticles(d.x + d.w / 2, state.groundY, 6);
      state.comboWindow = COMBO_WINDOW;
    }
  }

  // DinoAnimator updates
  state.breathePhase += dt * 3;
  state.tailWagPhase += dt * (4 + state.speed / 200);
  state.blinkTimer -= dt;
  if (state.blinkTimer <= 0) {
    if (state.isBlinking) {
      state.isBlinking = false;
      state.blinkTimer = 2 + Math.random() * 4;
    } else {
      state.isBlinking = true;
      state.blinkDuration = 0.1;
      state.blinkTimer = 0.1;
    }
  }

  // ComboTracker
  if (state.comboWindow > 0) state.comboWindow -= dt;
  if (state.comboActive) {
    state.comboTimer -= dt;
    if (state.comboTimer <= 0) state.comboActive = false;
  }

  // obstacles
  state.obstacles = state.obstacles.filter(o => o.x + o.w > -50);
  for (const o of state.obstacles) o.x -= state.speed * dt;

  state.spawnTimer -= dt;
  if (state.spawnTimer <= 0) {
    spawnObstacle();
    state.spawnTimer = MIN_SPAWN + Math.random() * (MAX_SPAWN - MIN_SPAWN);
  }

  // clouds
  state.clouds = state.clouds.filter(c => c.x + c.w > 0);
  state.cloudTimer -= dt;
  if (state.cloudTimer <= 0) {
    state.clouds.push({
      x: canvas.width + 10,
      y: 30 + Math.random() * state.groundY * 0.4,
      w: 60 + Math.random() * 40, h: 20 + Math.random() * 15,
      spd: 20 + Math.random() * 40
    });
    state.cloudTimer = 2 + Math.random() * 4;
  }
  for (const c of state.clouds) c.x -= c.spd * dt;

  // particles
  for (const p of state.particles) {
    p.x += p.vx * dt;
    p.y += p.vy * dt;
    p.vy += 80 * dt;
    p.life -= dt;
  }
  state.particles = state.particles.filter(p => p.life > 0);

  // score
  state.scoreTimer += dt;
  if (state.scoreTimer >= 0.1) {
    const mult = state.comboActive ? COMBO_SCORE_MULT : 1;
    state.score += mult;
    state.scoreTimer -= 0.1;
    if (state.score % 100 === 0) {
      state.speed = Math.min(state.speed + SPEED_INCREMENT * 10, MAX_SPEED);
    }
  }

  // collisions
  const dx = d.x + 5, dy = d.y + 5, dw = d.w - 10, dh = d.h - 10;
  for (const o of state.obstacles) {
    const ox = o.x + 3, oy = o.y + 3, ow = o.w - 6, oh = o.h - 6;
    if (dx < ox + ow && dx + dw > ox && dy < oy + oh && dy + dh > oy) {
      state.gameOver = true;
      state.highScore = Math.max(state.highScore, state.score);
      return;
    }
  }

  state.scroll += state.speed * dt;
}

function spawnObstacle() {
  const isBird = state.score > 50 && Math.random() > 0.7;
  if (isBird) {
    state.obstacles.push({
      x: canvas.width + 20,
      y: state.groundY - 80 - Math.random() * 60,
      w: 40, h: 25, type: 'bird'
    });
  } else {
    const h = 40 + Math.random() * 30;
    state.obstacles.push({
      x: canvas.width + 20,
      y: state.groundY - h,
      w: 25 + Math.random() * 15, h, type: 'cactus'
    });
  }
}

// ── Draw ──
function draw() {
  const W = canvas.width, H = canvas.height;
  const d = state.dino;
  const gY = state.groundY;

  // sky gradient (DayNightCycle)
  const sky = getSkyColors(state.score);
  const grad = ctx.createLinearGradient(0, 0, 0, gY);
  grad.addColorStop(0, sky.top);
  grad.addColorStop(1, sky.bot);
  ctx.fillStyle = grad;
  ctx.fillRect(0, 0, W, gY);

  // stars at night
  if (isNight(state.score)) {
    ctx.fillStyle = 'rgba(255,255,255,0.7)';
    for (let i = 0; i < 40; i++) {
      const sx = ((i * 137.5 + 42) % W);
      const sy = ((i * 97.3 + 13) % (gY * 0.6));
      const sr = (i % 3 === 0) ? 1.5 : 1;
      ctx.beginPath(); ctx.arc(sx, sy, sr, 0, Math.PI * 2); ctx.fill();
    }
  }

  // mountains (ParallaxHelper)
  for (const m of state.mountains) {
    const mx = ((m.x - state.scroll * (m.depth === 1 ? 0.08 : 0.03)) % (W + 200)) + 100;
    ctx.fillStyle = m.depth === 1 ? COLORS.mountain : COLORS.mountainFar;
    ctx.beginPath();
    ctx.moveTo(mx - m.w / 2, gY);
    ctx.lineTo(mx, gY - m.h);
    ctx.lineTo(mx + m.w / 2, gY);
    ctx.fill();
  }

  // ground
  ctx.fillStyle = COLORS.ground;
  ctx.fillRect(0, gY, W, H - gY);

  // ground lines
  ctx.strokeStyle = COLORS.groundLine;
  ctx.lineWidth = 2;
  let lx = state.scroll % 40;
  while (lx < W) {
    ctx.beginPath(); ctx.moveTo(lx, gY + 4); ctx.lineTo(lx + 15, gY + 4); ctx.stroke();
    lx += 40;
  }

  // ground rocks (GroundDecorator)
  ctx.fillStyle = COLORS.groundLine;
  let rx = state.scroll % 60;
  while (rx < W) {
    const worldX = rx + state.scroll;
    if (hasRockAt(worldX)) {
      const rh = rockHeight(worldX);
      ctx.beginPath(); ctx.arc(rx, gY + 8 + rh, rh, 0, Math.PI * 2); ctx.fill();
    }
    rx += 20;
  }

  // grass tufts (GroundDecorator)
  ctx.strokeStyle = COLORS.grass;
  ctx.lineWidth = 1.5;
  let gx = state.scroll % 35;
  while (gx < W) {
    const worldX = gx + state.scroll;
    if (hasGrassAt(worldX)) {
      const h = 4 + (worldX % 5);
      ctx.beginPath(); ctx.moveTo(gx, gY); ctx.lineTo(gx - 2, gY - h); ctx.stroke();
      ctx.beginPath(); ctx.moveTo(gx, gY); ctx.lineTo(gx + 2, gY - h + 1); ctx.stroke();
    }
    gx += 15;
  }

  // clouds (parallax)
  for (const c of state.clouds) {
    const depth = c.y < gY * 0.25 ? 2 : 1;
    ctx.fillStyle = depth === 2 ? COLORS.cloudFar : COLORS.cloud;
    // multi-blob cloud shape
    roundRect(c.x, c.y, c.w, c.h, 20);
    roundRect(c.x + c.w * 0.2, c.y - c.h * 0.3, c.w * 0.5, c.h * 0.5, 15);
  }

  // particles (ParticleSystem)
  for (const p of state.particles) {
    const alpha = Math.max(0, p.life / p.maxLife);
    ctx.fillStyle = `rgba(109,93,75,${(alpha * 0.6).toFixed(2)})`;
    ctx.beginPath(); ctx.arc(p.x, p.y, p.size * alpha, 0, Math.PI * 2); ctx.fill();
  }

  // ── DINO ──
  const br = breatheScale(state.breathePhase);
  const sx = squashX(d.vy, -JUMP_VELOCITY) * br;
  const sy = squashY(d.vy, -JUMP_VELOCITY) * (2 - br);
  const dw = d.w * sx, dh = d.h * sy;
  const ddx = d.x + (d.w - dw) / 2;
  const ddy = d.y + (d.h - dh);

  // spines along the back (VisualConfig)
  ctx.fillStyle = COLORS.dinoSpine;
  for (let i = 0; i < DINO_SPINE_COUNT; i++) {
    const spx = ddx + dw * 0.2 + (dw * 0.6 / DINO_SPINE_COUNT) * i;
    const spy = ddy;
    ctx.beginPath();
    ctx.moveTo(spx, spy);
    ctx.lineTo(spx + DINO_SPINE_WIDTH / 2, spy - DINO_SPINE_HEIGHT);
    ctx.lineTo(spx + DINO_SPINE_WIDTH, spy);
    ctx.fill();
  }

  // body
  ctx.fillStyle = COLORS.dino;
  roundRect(ddx, ddy, dw, dh, DINO_BODY_RADIUS);

  // belly patch
  ctx.fillStyle = COLORS.dinoBelly;
  roundRect(ddx + dw * 0.2, ddy + dh * 0.5, dw * 0.5, dh * 0.4, 6);

  // tail (TailRenderer — bezier curve with wag)
  const tail = tailCurve(state.speed, MAX_SPEED, state.tailWagPhase);
  ctx.strokeStyle = COLORS.dinoTail;
  ctx.lineWidth = 5;
  ctx.lineCap = 'round';
  ctx.beginPath();
  ctx.moveTo(ddx, ddy + dh * 0.4);
  ctx.bezierCurveTo(
    ddx + tail.cx1, ddy + dh * 0.4 + tail.cy1,
    ddx + tail.cx2, ddy + dh * 0.4 + tail.cy2,
    ddx + tail.ex, ddy + dh * 0.4 + tail.ey
  );
  ctx.stroke();

  // eye (with blink from DinoAnimator)
  if (!state.isBlinking) {
    ctx.fillStyle = '#FFF';
    ctx.beginPath(); ctx.arc(ddx + dw + EYE_OFFSET_X, ddy + EYE_OFFSET_Y, DINO_EYE_RADIUS, 0, Math.PI * 2); ctx.fill();
    ctx.fillStyle = '#000';
    ctx.beginPath(); ctx.arc(ddx + dw + EYE_OFFSET_X + PUPIL_SHIFT_X, ddy + EYE_OFFSET_Y, DINO_PUPIL_RADIUS, 0, Math.PI * 2); ctx.fill();
  } else {
    // closed eye — horizontal line
    ctx.strokeStyle = '#333';
    ctx.lineWidth = 2;
    ctx.beginPath();
    ctx.moveTo(ddx + dw + EYE_OFFSET_X - DINO_EYE_RADIUS, ddy + EYE_OFFSET_Y);
    ctx.lineTo(ddx + dw + EYE_OFFSET_X + DINO_EYE_RADIUS, ddy + EYE_OFFSET_Y);
    ctx.stroke();
  }

  // nostril (VisualConfig)
  ctx.fillStyle = '#1A5C2A';
  ctx.beginPath();
  ctx.arc(ddx + dw - 4, ddy + dh * 0.35, DINO_NOSTRIL_RADIUS, 0, Math.PI * 2);
  ctx.fill();

  // mouth
  ctx.strokeStyle = '#1A5C2A';
  ctx.lineWidth = 1.5;
  ctx.beginPath();
  ctx.moveTo(ddx + dw - 2, ddy + dh * 0.52);
  ctx.lineTo(ddx + dw - 2 - DINO_MOUTH_WIDTH, ddy + dh * 0.52 + DINO_MOUTH_HEIGHT);
  ctx.stroke();

  // legs
  ctx.strokeStyle = COLORS.dinoLeg;
  ctx.lineWidth = DINO_LEG_STROKE;
  ctx.lineCap = 'round';
  const legTop = ddy + dh;
  const legCycle = ((state.scroll / 15) | 0) % 2;
  if (d.onGround) {
    if (legCycle === 0) {
      line(ddx + 10, legTop, ddx + 6, legTop + 16);
      line(ddx + dw - 20, legTop, ddx + dw - 16, legTop + 16);
    } else {
      line(ddx + 10, legTop, ddx + 14, legTop + 16);
      line(ddx + dw - 20, legTop, ddx + dw - 24, legTop + 16);
    }
  } else {
    line(ddx + 10, legTop, ddx + 8, legTop + 12);
    line(ddx + dw - 20, legTop, ddx + dw - 18, legTop + 12);
  }

  // obstacles
  for (const o of state.obstacles) {
    if (o.type === 'cactus') {
      ctx.fillStyle = COLORS.cactus;
      roundRect(o.x, o.y, o.w, o.h, 4);
      // arms (asymmetric)
      ctx.fillRect(o.x - 8, o.y + 10, 12, 15);
      ctx.fillRect(o.x + o.w - 4, o.y + 18, 12, 12);
      // detail lines
      ctx.strokeStyle = COLORS.cactusDetail;
      ctx.lineWidth = 1;
      ctx.beginPath(); ctx.moveTo(o.x + o.w / 2, o.y + 4); ctx.lineTo(o.x + o.w / 2, o.y + o.h - 4); ctx.stroke();
    } else {
      // bird with proper wing animation
      ctx.fillStyle = COLORS.bird;
      roundRect(o.x, o.y, o.w, o.h, 6);
      // beak
      ctx.beginPath();
      ctx.moveTo(o.x + o.w, o.y + o.h * 0.4);
      ctx.lineTo(o.x + o.w + 8, o.y + o.h * 0.5);
      ctx.lineTo(o.x + o.w, o.y + o.h * 0.6);
      ctx.fillStyle = '#D2691E';
      ctx.fill();
      // wing
      ctx.fillStyle = COLORS.birdWing;
      const wingAngle = Math.sin(state.scroll / 10 * Math.PI) * 0.6;
      ctx.save();
      ctx.translate(o.x + o.w / 2, o.y + o.h * 0.3);
      ctx.rotate(wingAngle);
      ctx.fillRect(-12, -3, 24, 6);
      ctx.restore();
      // eye
      ctx.fillStyle = '#FFF';
      ctx.beginPath(); ctx.arc(o.x + o.w - 8, o.y + 8, 3, 0, Math.PI * 2); ctx.fill();
      ctx.fillStyle = '#000';
      ctx.beginPath(); ctx.arc(o.x + o.w - 7, o.y + 8, 1.5, 0, Math.PI * 2); ctx.fill();
    }
  }

  // score
  const scoreColor = isNight(state.score) ? '#CCCCCC' : COLORS.score;
  ctx.fillStyle = scoreColor;
  ctx.font = 'bold 28px monospace';
  ctx.textAlign = 'left';
  ctx.fillText(`Score: ${state.score}`, 20, 35);
  ctx.font = 'bold 20px monospace';
  ctx.fillText(`High: ${state.highScore}`, 20, 62);

  // combo indicator (ComboTracker)
  if (state.comboActive) {
    const alpha = Math.min(1, state.comboTimer / 0.5);
    ctx.fillStyle = `rgba(255,215,0,${alpha.toFixed(2)})`;
    ctx.font = 'bold 18px monospace';
    ctx.textAlign = 'center';
    ctx.fillText('COMBO x2!', d.x + d.w / 2, d.y - 20);
  }

  // game over
  if (state.gameOver) {
    ctx.fillStyle = 'rgba(0,0,0,0.45)';
    ctx.fillRect(0, 0, W, H);
    ctx.fillStyle = COLORS.gameOver;
    ctx.font = 'bold 48px monospace';
    ctx.textAlign = 'center';
    ctx.fillText('GAME OVER', W / 2, H / 2 - 30);
    ctx.fillStyle = isNight(state.score) ? '#AAAAAA' : COLORS.subtitle;
    ctx.font = '24px monospace';
    ctx.fillText(`Score: ${state.score}`, W / 2, H / 2 + 10);
    ctx.fillText('Click to restart', W / 2, H / 2 + 45);
  }
}

// ── Helpers ──
function roundRect(x, y, w, h, r) {
  ctx.beginPath();
  ctx.moveTo(x + r, y);
  ctx.lineTo(x + w - r, y);
  ctx.quadraticCurveTo(x + w, y, x + w, y + r);
  ctx.lineTo(x + w, y + h - r);
  ctx.quadraticCurveTo(x + w, y + h, x + w - r, y + h);
  ctx.lineTo(x + r, y + h);
  ctx.quadraticCurveTo(x, y + h, x, y + h - r);
  ctx.lineTo(x, y + r);
  ctx.quadraticCurveTo(x, y, x + r, y);
  ctx.fill();
}

function line(x1, y1, x2, y2) {
  ctx.beginPath(); ctx.moveTo(x1, y1); ctx.lineTo(x2, y2); ctx.stroke();
}

// ── Input ──
function handleInput() {
  if (state.gameOver) {
    const hs = state.highScore;
    state = createState();
    init();
    state.highScore = hs;
  } else if (state.dino.onGround) {
    // ComboTracker — detect double-tap
    let boost = 1;
    if (state.comboWindow > 0) {
      state.comboActive = true;
      state.comboTimer = 2.0;
      boost = COMBO_JUMP_BOOST;
    }
    state.dino.vy = JUMP_VELOCITY * boost;
    state.dino.onGround = false;
    state.comboWindow = 0;
    spawnDustParticles(state.dino.x + state.dino.w / 2, state.groundY, 4);
  }
}

canvas.addEventListener('click', handleInput);
canvas.addEventListener('touchstart', (e) => { e.preventDefault(); handleInput(); });
document.addEventListener('keydown', (e) => { if (e.code === 'Space') { e.preventDefault(); handleInput(); } });

// ── Loop ──
let lastTime = performance.now();
init();

function loop(now) {
  const dt = Math.min((now - lastTime) / 1000, 0.05);
  lastTime = now;
  update(dt);
  draw();
  requestAnimationFrame(loop);
}
requestAnimationFrame(loop);
</script>
</body>
